<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>[CCTV] Rush Hour Tracker</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --panel-bg: #1a1a1a;
            --border-color: #333;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --color-under: #ff4444;
            --color-over: #00c851;
        }

        body, html {
            margin: 0; padding: 0; height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* КАРТА */
        #map {
            flex-grow: 1;
            width: 100%;
            background: #121212;
        }

        /* ТЕМНАЯ ТЕМА И СКРЫТИЕ ЛИШНЕГО */
        .leaflet-layer { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        .leaflet-control-attribution { display: none !important; }
        .leaflet-bar { border: 1px solid var(--border-color) !important; }

        /* НИЖНЯЯ ПАНЕЛЬ (Горизонтальная) */
        .bottom-panel {
            height: 200px;
            background-color: var(--panel-bg);
            display: grid;
            grid-template-columns: 1fr 1fr 1.2fr 1.5fr;
            gap: 15px;
            padding: 12px;
            box-sizing: border-box;
            border-top: 1px solid var(--border-color);
        }

        .column { display: flex; flex-direction: column; gap: 6px; overflow: hidden; }
        h2 { font-size: 0.65rem; color: var(--text-dim); margin: 0; text-transform: uppercase; letter-spacing: 0.5px; }

        .upload-zone {
            flex-grow: 1; border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: #222; font-size: 0.7rem; 
            text-align: center; color: var(--text-dim); border-radius: 4px;
        }
        input[type="file"] { display: none; }

        input[type="text"] {
            width: 100%; padding: 8px; background: #000;
            border: 1px solid var(--border-color); color: #fff;
            font-size: 0.8rem; border-radius: 4px;
        }

        .btn-search {
            padding: 6px; background: #333; color: #ccc; border-radius: 4px;
            border: 1px solid #444; cursor: pointer; text-transform: uppercase; font-size: 0.6rem;
        }

        .log-box {
            background: #0a0a0a; border: 1px solid var(--border-color);
            padding: 8px; font-size: 0.65rem; color: #00ff66;
            overflow-y: auto; flex-grow: 1; font-family: monospace; border-radius: 4px;
        }

        /* АНАЛИТИКА */
        .prediction-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 5px; flex-grow: 1; align-items: center;
        }

        .outcome-card {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            opacity: 0.2; transition: 0.3s;
        }
        .outcome-card.active { opacity: 1; transform: scale(1.05); }
        
        .icon {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: white; border: 2px solid rgba(255,255,255,0.1);
        }
        .icon.under { background: var(--color-under); }
        .icon.range { background: #33b5e5; }
        .icon.over { background: var(--color-over); }
        .icon.exact { background: #ffbb33; }
        
        .outcome-label { font-size: 0.6rem; font-weight: bold; text-transform: uppercase; }

        .header-tag {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(0,0,0,0.8); padding: 4px 10px;
            border: 1px solid var(--border-color); font-weight: bold; font-size: 0.75rem;
            color: #fff; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="header-tag">[CCTV] RUSH HOUR TRACKER</div>
    <div id="map"></div>

    <div class="bottom-panel">
        <div class="column">
            <h2>1. СКРИНШОТ</h2>
            <label class="upload-zone">
                ВЫБРАТЬ
                <input type="file" id="img-input" accept="image/*">
            </label>
        </div>

        <div class="column">
            <h2>2. ТЕКСТ</h2>
            <input type="text" id="text-input" placeholder="...">
            <button class="btn-search" onclick="doSearch()">НАЙТИ</button>
        </div>

        <div class="column">
            <h2>ЛОГ СИСТЕМЫ</h2>
            <div class="log-box" id="log-display">
                <div>> Ожидание...</div>
            </div>
        </div>

        <div class="column">
            <h2>4. АНАЛИТИКА</h2>
            <div class="prediction-grid">
                <div class="outcome-card" id="card-under">
                    <div class="icon under">▼</div>
                    <div class="outcome-label">Under</div>
                </div>
                <div class="outcome-card" id="card-range">
                    <div class="icon range">↔</div>
                    <div class="outcome-label">Range</div>
                </div>
                <div class="outcome-card" id="card-over">
                    <div class="icon over">▲</div>
                    <div class="outcome-label">Over</div>
                </div>
                <div class="outcome-card" id="card-exact">
                    <div class="icon exact">★</div>
                    <div class="outcome-label">Exact</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <script>
        // Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран
        tg.ready();

        const map = L.map('map', {zoomControl: false}).setView([34.06, -118.16], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = null;

        function log(msg) {
            const display = document.getElementById('log-display');
            display.innerHTML += `<div>> ${msg}</div>`;
            display.scrollTop = display.scrollHeight;
        }

        document.getElementById('img-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            resetUI();
            log(`Файл: ${file.name}`);
            log(`Запуск Rush Hour Tracker (чтение текста)...`);

            try {
                const res = await Tesseract.recognize(file, 'eng');
                const text = res.data.text.split('\n')[0].replace(/[^a-zA-Z0-9, ]/g, '').trim();
                document.getElementById('text-input').value = text;
                log(`Найдено: ${text}`);
                doSearch(text);
            } catch (err) {
                log("Ошибка OCR.");
            }
        });

        async function doSearch(queryOverride) {
            const query = queryOverride || document.getElementById('text-input').value;
            if (!query) return;

            log("Поиск локации...");
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await response.json();

                if (data.length > 0) {
                    const {lat, lon} = data[0];
                    if (marker) map.removeLayer(marker);
                    marker = L.marker([lat, lon]).addTo(map);
                    map.flyTo([lat, lon], 16);
                    log(`Объект найден.`);
                    calculateResult();
                } else {
                    log("Адрес не найден.");
                }
            } catch (e) { log("Ошибка связи."); }
        }

        function calculateResult() {
            log("Анализ трафика...");
            const cards = ['card-under', 'card-over'];
            let i = 0;
            const flicker = setInterval(() => {
                document.querySelectorAll('.outcome-card').forEach(c => c.classList.remove('active'));
                document.getElementById(cards[i % 2]).classList.add('active');
                i++;
            }, 100);

            setTimeout(() => {
                clearInterval(flicker);
                document.querySelectorAll('.outcome-card').forEach(c => c.classList.remove('active'));
                const result = cards[Math.floor(Math.random() * 2)];
                document.getElementById(result).classList.add('active');
                log(`Вероятный исход: ${result === 'card-under' ? 'UNDER' : 'OVER'}`);
            }, 1800);
        }

        function resetUI() {
            document.querySelectorAll('.outcome-card').forEach(c => c.classList.remove('active'));
        }
    </script>
</body>
</html>
