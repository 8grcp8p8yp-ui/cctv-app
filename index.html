<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>[CCTV] Rush Hour Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-dark: #060614;
            --panel-bg: #0d0d2b;
            --accent: #7b2ff7;
            --accent-glow: rgba(123, 47, 247, 0.4);
            --text-main: #ffffff;
            --text-dim: #b0b0d1;
            --card-bg: rgba(255, 255, 255, 0.05);
            
            --color-under: #ff3366;
            --color-over: #00ffa3;
            --color-range: #00d1ff;
            --color-exact: #ffcc00;
        }

        body, html {
            margin: 0; padding: 0; height: 100vh;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* КАРТА */
        #map {
            height: 40vh;
            width: 100%;
            background: #000;
            z-index: 1;
        }
        .leaflet-layer { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        .leaflet-control-attribution { display: none !important; }

        .header-tag {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: rgba(13, 13, 43, 0.9); padding: 8px 16px;
            border: 1px solid var(--accent); border-radius: 30px;
            font-weight: 800; font-size: 0.65rem; letter-spacing: 1px;
            backdrop-filter: blur(5px);
        }

        /* ПАНЕЛЬ */
        .main-container {
            height: 60vh;
            background: var(--panel-bg);
            border-top: 2px solid var(--accent);
            border-radius: 30px 30px 0 0;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
            z-index: 1001;
        }

        .section-title {
            font-size: 0.6rem; color: var(--accent);
            text-transform: uppercase; font-weight: 900;
            margin-bottom: 5px; letter-spacing: 1.2px;
        }

        /* 1. ИСХОДЫ (В РЯД) */
        .outcomes-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 10px 2px; transition: 0.3s;
            opacity: 0.25;
        }
        .card.active {
            opacity: 1; transform: scale(1.05);
            background: rgba(123, 47, 247, 0.15);
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .icon-circle {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; color: #fff; margin-bottom: 4px;
        }
        .icon-circle.under { background: var(--color-under); }
        .icon-circle.range { background: var(--color-range); }
        .icon-circle.over { background: var(--color-over); }
        .icon-circle.exact { background: var(--color-exact); }

        .label { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; }

        /* 2. СРЕДНИЙ БЛОК */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            flex-grow: 1;
        }

        .col { display: flex; flex-direction: column; gap: 8px; }

        .upload-btn {
            background: var(--card-bg); border: 1px dashed var(--accent);
            border-radius: 12px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; color: var(--text-dim); text-align: center;
            cursor: pointer;
        }

        input[type="text"] {
            background: #000; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 12px; color: #fff;
            font-size: 0.8rem; outline: none; width: 100%; box-sizing: border-box;
        }

        .log-box {
            background: rgba(0,0,0,0.4); border-radius: 12px;
            padding: 10px; font-size: 0.65rem; color: #00ffa3;
            font-family: monospace; overflow-y: auto; flex-grow: 1;
            border: 1px solid rgba(255,255,255,0.05);
            max-height: 100px;
        }

        /* 3. КНОПКА ВНИЗУ (ГДЕ ТЫ ОБВЕЛ) */
        .action-container {
            padding-top: 5px;
            padding-bottom: 10px;
        }

        .btn-action {
            background: linear-gradient(135deg, var(--accent), #4a148c);
            color: white; border: none; border-radius: 15px;
            padding: 18px; font-weight: 900; font-size: 0.85rem;
            text-transform: uppercase; box-shadow: 0 4px 20px var(--accent-glow);
            width: 100%;
            letter-spacing: 1px;
        }
        .btn-action:active { transform: scale(0.98); opacity: 0.9; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="header-tag">[CCTV] RUSH HOUR TRACKER</div>
    <div id="map"></div>

    <div class="main-container">
        <div>
            <div class="section-title">Вероятность исхода</div>
            <div class="outcomes-row">
                <div class="card" id="card-under">
                    <div class="icon-circle under">▼</div>
                    <div class="label">Under</div>
                </div>
                <div class="card" id="card-range">
                    <div class="icon-circle range">↔</div>
                    <div class="label">Range</div>
                </div>
                <div class="card" id="card-over">
                    <div class="icon-circle over">▲</div>
                    <div class="label">Over</div>
                </div>
                <div class="card" id="card-exact">
                    <div class="icon-circle exact">★</div>
                    <div class="label">Exact</div>
                </div>
            </div>
        </div>

        <div class="controls-grid">
            <div class="col">
                <div class="section-title">Входные данные</div>
                <label class="upload-btn">
                    <span>ЗАГРУЗИТЬ ФОТО</span>
                    <input type="file" id="img-input" accept="image/*">
                </label>
                <input type="text" id="text-input" placeholder="usa">
            </div>

            <div class="col">
                <div class="section-title">Статус системы</div>
                <div class="log-box" id="log-display">
                    <div>> СИСТЕМА ГОТОВА</div>
                </div>
            </div>
        </div>

        <div class="action-container">
            <button class="btn-action" onclick="doSearch()">ЗАПУСТИТЬ АНАЛИЗ</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <script>
        const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = null;

        // Фикс черного экрана
        window.onload = () => { setTimeout(() => { map.invalidateSize(); }, 300); };

        function log(msg) {
            const display = document.getElementById('log-display');
            display.innerHTML += `<div>> ${msg}</div>`;
            display.scrollTop = display.scrollHeight;
        }

        document.getElementById('img-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            resetUI();
            log(`ФАЙЛ: ${file.name}`);
            log(`АНАЛИЗ ТЕКСТА...`);
            try {
                const res = await Tesseract.recognize(file, 'eng');
                const text = res.data.text.split('\n')[0].replace(/[^a-zA-Z0-9, ]/g, '').trim();
                document.getElementById('text-input').value = text;
                log(`НАЙДЕНО: ${text}`);
                doSearch(text);
            } catch (err) { log("ОШИБКА OCR"); }
        });

        async function doSearch(queryOverride) {
            const query = queryOverride || document.getElementById('text-input').value;
            if (!query) return;
            resetUI();
            log(`ПОИСК: ${query}`);
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await response.json();
                if (data.length > 0) {
                    const {lat, lon} = data[0];
                    if (marker) map.removeLayer(marker);
                    marker = L.marker([lat, lon]).addTo(map);
                    map.flyTo([lat, lon], 15, {duration: 2}); 
                    log(`ОБЪЕКТ В ЗОНЕ ВИДИМОСТИ`);
                    setTimeout(calculateResult, 2200);
                } else { log("НЕ НАЙДЕНО"); }
            } catch (e) { log("ОШИБКА СЕТИ"); }
        }

        function calculateResult() {
            log("АНАЛИЗ ЗАВЕРШЕН");
            const options = ['card-under', 'card-over'];
            const winner = options[Math.floor(Math.random() * options.length)];
            document.getElementById(winner).classList.add('active');
            log(`ИТОГ: ${winner === 'card-under' ? 'UNDER' : 'OVER'}`);
        }

        function resetUI() {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        }
    </script>
</body>
</html>
