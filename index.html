<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>[CCTV] Rush Hour Tracker</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-dark: #060614;
            --panel-bg: #0a0a1f;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #aaccff;
            --accent: #0099ff;
            --column-heading: #6666cc; 
            
            --color-under: #ff3333;
            --color-range: #00ddee;
            --color-over: #00ff44;
            --color-exact: #ffaa00;
        }

        body, html {
            margin: 0; padding: 0; height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #map { flex-grow: 1; width: 100%; background: #121212; }
        .leaflet-layer { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        .leaflet-control-attribution { display: none !important; }

        /* ОСНОВНАЯ ПАНЕЛЬ */
        .bottom-panel {
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            border-radius: 20px 20px 0 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 1. ВЕРХНЯЯ СТРОКА (ВЕРОЯТНОСТЬ ИСХОДА) */
        .outcomes-section { width: 100%; }
        
        .prediction-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 8px;
        }

        /* 2. НИЖНЯЯ СЕТКА (ЛОГ И КНОПКИ) */
        .controls-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1.5fr; /* Четкое разделение, чтобы не наезжали */
            gap: 15px;
            align-items: start;
        }

        .column { display: flex; flex-direction: column; gap: 8px; }
        
        h2 { 
            font-size: 0.65rem; 
            color: var(--column-heading); 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 0.8px; 
            font-weight: bold;
        }

        /* ЭЛЕМЕНТЫ */
        .upload-zone {
            padding: 10px; border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 10px; color: var(--text-dim);
            font-size: 0.65rem; text-align: center; cursor: pointer;
        }
        
        input[type="text"] {
            width: 100%; padding: 10px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color); color: var(--text-main);
            font-size: 0.8rem; border-radius: 8px; box-sizing: border-box;
        }

        .btn-search {
            padding: 12px; background: var(--accent); color: #fff; border-radius: 8px;
            border: none; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; font-weight: bold;
        }

        .log-box {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border-color);
            padding: 8px; font-size: 0.7rem; color: #00ffaa;
            height: 80px; overflow-y: auto; font-family: monospace; border-radius: 8px;
        }

        /* КАРТОЧКИ ИСХОДОВ */
        .outcome-card {
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            gap: 4px; padding: 8px;
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color);
            border-radius: 10px; opacity: 0.15; transition: 0.2s;
        }
        .outcome-card.active { 
            opacity: 1; transform: scale(1.03); 
            background: rgba(0, 153, 255, 0.1);
            border-color: var(--accent);
        }
        
        .icon {
            width: 26px; height: 26px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: white;
        }
        .icon.under { background: var(--color-under); }
        .icon.range { background: var(--color-range); }
        .icon.over { background: var(--color-over); }
        .icon.exact { background: var(--color-exact); }
        
        .outcome-label { font-size: 0.55rem; font-weight: bold; text-transform: uppercase; }

        .header-tag {
            position: absolute; top: 15px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.8); padding: 5px 15px;
            border: 1px solid var(--border-color); font-size: 0.75rem;
            color: var(--text-main); border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="header-tag">[CCTV] RUSH HOUR TRACKER</div>
    <div id="map"></div>

    <div class="bottom-panel">
        <div class="outcomes-section">
            <h2>4. ВЕРОЯТНОСТЬ ИСХОДА</h2>
            <div class="prediction-row">
                <div class="outcome-card" id="card-under">
                    <div class="icon under">▼</div>
                    <div class="outcome-label">Under</div>
                </div>
                <div class="outcome-card" id="card-range">
                    <div class="icon range">↔</div>
                    <div class="outcome-label">Range</div>
                </div>
                <div class="outcome-card" id="card-over">
                    <div class="icon over">▲</div>
                    <div class="outcome-label">Over</div>
                </div>
                <div class="outcome-card" id="card-exact">
                    <div class="icon exact">★</div>
                    <div class="outcome-label">Exact</div>
                </div>
            </div>
        </div>

        <div class="controls-grid">
            <div class="column">
                <h2>1. ДЕЙСТВИЕ</h2>
                <label class="upload-zone">
                    📁 ВЫБРАТЬ ФОТО
                    <input type="file" id="img-input" accept="image/*">
                </label>
                <button class="btn-search" onclick="doSearch()">АНАЛИЗ</button>
            </div>

            <div class="column">
                <h2>2. ДАННЫЕ</h2>
                <input type="text" id="text-input" placeholder="Адрес...">
            </div>

            <div class="column">
                <h2>СИСТЕМНЫЙ ЛОГ</h2>
                <div class="log-box" id="log-display">
                    <div>> Лог Rush Hour загружен.</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const map = L.map('map', {zoomControl: false}).setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = null;

        function log(msg) {
            const display = document.getElementById('log-display');
            display.innerHTML += `<div>> ${msg}</div>`;
            display.scrollTop = display.scrollHeight;
        }

        document.getElementById('img-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            resetUI();
            log(`Чтение изображения...`);
            try {
                const res = await Tesseract.recognize(file, 'eng');
                const text = res.data.text.split('\n')[0].replace(/[^a-zA-Z0-9, ]/g, '').trim();
                document.getElementById('text-input').value = text;
                log(`Найдено: ${text}`);
                doSearch(text);
            } catch (err) { log("Ошибка OCR."); }
        });

        async function doSearch(queryOverride) {
            const query = queryOverride || document.getElementById('text-input').value;
            if (!query) return;
            resetUI();
            log("Поиск объекта...");
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await response.json();
                if (data.length > 0) {
                    const {lat, lon} = data[0];
                    if (marker) map.removeLayer(marker);
                    marker = L.marker([lat, lon]).addTo(map);
                    map.flyTo([lat, lon], 16, {duration: 2});
                    setTimeout(() => { calculateFinalResult(); }, 2100);
                } else { log("Адрес не найден."); }
            } catch (e) { log("Ошибка сети."); }
        }

        function calculateFinalResult() {
            const options = ['card-under', 'card-over'];
            const winner = options[Math.floor(Math.random() * options.length)];
            document.getElementById(winner).classList.add('active');
            log(`ИТОГ: ${winner === 'card-under' ? 'UNDER' : 'OVER'}`);
        }

        function resetUI() {
            document.querySelectorAll('.outcome-card').forEach(c => c.classList.remove('active'));
        }
    </script>
</body>
</html>
